<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2.0 驗測結果審閱</title>
    <style>
      * { box-sizing: border-box; }
      :root {
        --bg: #f2f5f8;
        --panel: #fff;
        --ink: #1d2b3a;
        --muted: #607286;
        --line: #cfd9e4;
        --accent: #315f80;
        --accent-soft: #e5eff7;
        --warn: #a96300;
        --danger: #b4364d;
        --ok: #356b8c;
      }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Segoe UI", system-ui, sans-serif;
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 14px 22px;
        background: rgba(245, 247, 249, .95);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }
      h1 { margin: 0 0 8px; font-size: 22px; }
      .meta, .pillrow { display: flex; flex-wrap: wrap; gap: 8px; }
      .pill, .tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--muted);
        font-size: 13px;
      }
      .actions { display: flex; gap: 10px; align-items: center; }
      .search {
        width: min(420px, 44vw);
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .btn {
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
      }
      #print { display: none; }
      .layout {
        display: grid;
        grid-template-columns: 245px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }
      .sidebar, .content, .case-head, .module {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .sidebar { max-height: calc(100vh - 105px); overflow: auto; }
      .sidebar-head {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        padding: 13px 14px;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }
      .case-list { display: grid; gap: 5px; padding: 6px; }
      .case-btn {
        width: 100%;
        padding: 7px 8px;
        text-align: left;
        border: 1px solid transparent;
        border-radius: 6px;
        background: #f9fbfc;
      }
      .case-btn:hover, .case-btn.active { border-color: var(--accent); background: #dceaf5; }
      .case-title { display: block; font-weight: 700; font-size: 13px; overflow-wrap: anywhere; }
      .case-sub { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; overflow-wrap: anywhere; }
      .case-modules { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
      .case-module { padding: 3px 7px; border: 1px solid #a9c5da; border-radius: 4px; background: #c9ddec; color: #244d6b; font-size: 11px; font-weight: 700; }
      .condition-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px; }
      .condition-meta > div { padding: 10px; background: #f8fafb; }
      .exposure-chart { padding: 12px 8px; border: 1px solid var(--line); background: #fff; }
      .bar-row { display: grid; grid-template-columns: 42px 1fr; gap: 8px; align-items: center; margin: 17px 0; }
      .bar-label { color: var(--muted); font-size: 12px; }
      .bar-stack { display: grid; gap: 5px; background: repeating-linear-gradient(to right, transparent 0, transparent calc(20% - 1px), #edf1f4 calc(20% - 1px), #edf1f4 20%); }
      .bar { position: relative; height: 10px; min-width: 2px; border-radius: 5px; }
      .bar::after { content: attr(data-tooltip); position: absolute; left: 0; bottom: 15px; z-index: 3; display: none; padding: 5px 8px; border-radius: 4px; background: #17212b; color: #fff; white-space: nowrap; font-size: 11px; font-weight: 500; pointer-events: none; }
      .bar:hover::after { display: block; }
      .bar.case { background: #8bd5b0; } .bar.p75 { background: #ff8d8d; } .bar.minimum { background: #76b7ed; }
      .chart-legend { display: flex; gap: 14px; margin-top: 12px; color: var(--muted); font-size: 12px; }
      .chart-scale { display: grid; grid-template-columns: repeat(6, 1fr); margin-left: 50px; color: var(--muted); font-size: 10px; }
      .chart-scale span { text-align: right; }
      .legend-dot { display: inline-block; width: 10px; height: 7px; margin-right: 4px; border-radius: 4px; }
      .condition-table { table-layout: fixed; }
      .condition-table th:first-child, .condition-table td:first-child { width: 85px; max-width: 85px; white-space: nowrap; color: var(--muted); font-weight: 700; }
      .condition-table th:nth-child(2), .condition-table td:nth-child(2) { width: auto; }
      .subject-table th, .subject-table td { text-align: left; color: var(--ink); }
      .subject-table th:first-child, .subject-table td:first-child { width: calc(5em + 26px); max-width: calc(5em + 26px); white-space: nowrap; color: var(--ink); font-weight: 700; }
      .subject-table th:nth-child(2), .subject-table td:nth-child(2) { width: 20px; max-width: 20px; white-space: nowrap; }
      .subject-table td:nth-child(3) { line-height: 1.7; }
      .subject-result { color: var(--ink) !important; font-weight: 700; }
      .history-summary { padding: 12px; border: 1px solid var(--line); border-radius: 6px; line-height: 1.75; white-space: pre-wrap; }
      .history-table { table-layout: fixed; }
      .history-table th:first-child, .history-table td:first-child { width: calc(4em + 16px); max-width: calc(4em + 16px); white-space: nowrap; font-weight: 700; }
      .history-table td { line-height: 1.7; white-space: pre-wrap; }
      .review-table th:first-child, .review-table td:first-child { width: 105px; white-space: nowrap; font-weight: 700; }
      .review-table th:nth-child(2), .review-table td:nth-child(2) { width: 170px; white-space: nowrap; }
      .review-table td { line-height: 1.65; white-space: pre-wrap; }
      .review-table tr.review-alt td { background: #f0f1f2; }
      .version-picker { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
      .version-picker label { color: var(--muted); font-size: 12px; }
      .delivery-date { color: var(--muted); font-size: 12px; }
      .version-select { padding: 6px 9px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
      @media (max-width: 620px) { .condition-meta { grid-template-columns: 1fr; } }
      .content { padding: 16px; }
      .case-head { padding: 18px; margin-bottom: 14px; }
      .case-head h2 { margin: 0 0 14px; font-size: 24px; }
      .case-head > .pillrow { display: none; }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }
      .summary-item { padding: 7px 9px; border: 1px solid var(--line); border-radius: 6px; background: #fbfcfd; }
      .label { display: block; color: var(--muted); font-size: 11px; }
      .value { display: block; margin-top: 2px; overflow-wrap: anywhere; font-size: 16px; font-weight: 700; }
      .filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
      .filter {
        padding: 7px 12px;
        font-size: 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .filter.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
      .filter[data-module="歷史"] { border-color: #9bb7cc; background: #e7eff5; color: #31566f; }
      .filter[data-module="條件"] { border-color: #8fb9b8; background: #e5f1f0; color: #286267; }
      .filter[data-module="標的"] { border-color: #b4add0; background: #eeeaf7; color: #554b7b; }
      .filter[data-module="歷史"].active, .filter[data-module="條件"].active, .filter[data-module="標的"].active { box-shadow: inset 0 0 0 2px currentColor; }
      .modules { display: grid; gap: 14px; }
      .module { overflow: hidden; }
      .module-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfd;
      }
      .module h3 { margin: 0; font-size: 19px; }
      .score { color: #fff; background: var(--accent); }
      .score.mid { background: var(--warn); }
      .score.high { background: var(--danger); }
      .score-panel {
        display: grid;
        align-content: center;
        gap: 7px;
        min-width: 0;
      }
      .score-number {
        font-size: 24px;
        font-weight: 800;
        text-align: right;
      }
      .score-track {
        height: 9px;
        overflow: hidden;
        border-radius: 5px;
        background: #e8edf2;
      }
      .score-fill {
        width: var(--score-width);
        height: 100%;
        background: var(--score-color);
      }
      .module-body { display: block; padding: 16px; }
      .quick-review {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 0 16px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfd;
      }
      .check-chip {
        min-height: 54px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 6px;
        background: #fff;
      }
      .check-chip.warn { border-left-color: var(--warn); }
      .check-chip.danger { border-left-color: var(--danger); }
      .check-chip strong { display: block; font-size: 13px; }
      .check-chip span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
      th { width: 42%; color: var(--muted); font-weight: 600; }
      .section {
        margin-bottom: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .section summary {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        color: var(--ink);
        font-weight: 800;
        list-style: none;
        cursor: pointer;
      }
      .section summary::-webkit-details-marker { display: none; }
      .section summary::after { content: "展開"; color: var(--muted); font-size: 12px; font-weight: 500; }
      .section[open] summary::after { content: "收合"; }
      .section p { margin: 0; padding: 0 12px 12px; line-height: 1.72; white-space: pre-wrap; }
      .status { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 10px; }
      .status button {
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .status button.active { border-color: var(--accent); background: var(--accent-soft); }
      textarea { width: 100%; min-height: 36px; resize: vertical; border: 1px solid var(--line); border-radius: 6px; padding: 8px; }
      .empty { padding: 24px; color: var(--muted); text-align: center; }
      @media (max-width: 980px) {
        .topbar, .layout, .module-head, .module-body, .quick-review { grid-template-columns: 1fr; }
        .search { width: 100%; }
        .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .sidebar { max-height: 45vh; }
      }
      @media (max-width: 620px) {
        .summary-grid { grid-template-columns: 1fr; }
        .actions { flex-direction: column; align-items: stretch; }
      }
      @media print {
        .topbar, .sidebar, .filters, .status { display: none; }
        .layout, .module-body { display: block; padding: 0; }
        .content, .case-head, .module { border: 0; }
        .module { break-inside: avoid; }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>2.0智能助理驗測平台</h1>
        <div class="meta" id="meta"></div>
      </div>
      <div class="actions">
        <input class="search" id="search" type="search" placeholder="搜尋客戶、進件編號、標的或模組內容" />
        <button class="btn" id="print" type="button">列印</button>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-head"><strong>案例清單</strong><span id="count"></span></div>
        <div class="case-list" id="caseList"></div>
      </aside>
      <main class="content">
        <section class="case-head" id="caseHead"></section>
        <nav class="filters" id="filters"></nav>
        <section class="modules" id="modules"></section>
      </main>
    </div>
    <script src="./validation-review-data-new.js"></script>
    <script>
      const data = window.validationReviewData || {};
      const cases = Array.isArray(data.cases) ? data.cases : [];
      const state = { query: "", activeCaseId: cases[0]?.id || "", activeModule: "全部" };
      const summaryKeys = [
        ["CUSTOMER_ID", "客戶 ID"], ["APPLLTE_NO", "進件編號"], ["OBJECT_NAME", "承接標的"],
        ["REVENUE", "營業額"], ["AOP_AMOUNT_PRODUCT", "每一人身體傷害"], ["AOA_AMOUNT_PRODUCT", "每一事故身體傷害"],
        ["APD_AMOUNT_PRODUCT", "每一事故財物損失"], ["AGG_AMOUNT_PRODUCT", "保險期間累計"]
      ];
      const statusOptions = ["待審閱", "已確認", "需追蹤"];
      const els = {
        meta: document.getElementById("meta"), search: document.getElementById("search"), count: document.getElementById("count"),
        caseList: document.getElementById("caseList"), caseHead: document.getElementById("caseHead"),
        filters: document.getElementById("filters"), modules: document.getElementById("modules")
      };
      function esc(v) {
        return String(v ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
      }
      function fmt(v, key = "") {
        const s = String(v ?? "");
        if (!s) return "-";
        if (/AMOUNT|REVENUE|DDCB/.test(key) && !Number.isNaN(Number(s))) return Number(s).toLocaleString("zh-TW");
        return s;
      }
      function filteredCases() {
        const q = state.query.trim().toLowerCase();
        if (!q) return cases;
        return cases.filter(item => {
          const summary = Object.values(item.summary || {}).join(" ");
          const modules = (item.modules || []).map(m => `${m.name} ${m.output} ${m.claimSummary}`).join(" ");
          return `${item.title} ${summary} ${modules}`.toLowerCase().includes(q);
        });
      }
      function activeCase() {
        return cases.find(item => item.id === state.activeCaseId) || cases[0];
      }
      function storageKey(caseId, moduleName, field) {
        return `validation-review-v2:${caseId}:${moduleName}:${field}`;
      }
      function renderMeta() {
        const parts = [`來源：${data.sourceFile || "-"}`, `頁籤：${data.sourceSheet || "-"}`, `產生：${data.generatedAt || "-"}`, `案例：${cases.length}`];
        els.meta.innerHTML = parts.map(part => `<span class="pill">${esc(part)}</span>`).join("");
      }
      function renderList() {
        const list = filteredCases();
        els.count.textContent = `${list.length}/${cases.length}`;
        els.caseList.innerHTML = list.length ? list.map(item => {
          const s = item.summary || {};
          return `<button class="case-btn ${item.id === state.activeCaseId ? "active" : ""}" data-id="${esc(item.id)}">
            <span class="case-title">${esc(item.title)}</span>
            <span class="case-sub">${esc(s.APPLLTE_NO || "")} · ${esc(s.OBJECT_NAME || "")}</span>
            <span class="case-sub">模組 ${esc((item.modules || []).length)}</span>
          </button>`;
        }).join("") : `<div class="empty">找不到符合條件的案例</div>`;
        els.caseList.querySelectorAll("[data-id]").forEach(button => button.addEventListener("click", () => {
          state.activeCaseId = button.dataset.id;
          state.activeModule = "全部";
          render();
        }));
      }
      function scoreClass(score) {
        const n = Number(score);
        if (!Number.isFinite(n)) return "";
        if (n < 5) return "high";
        if (n < 8) return "mid";
        return "";
      }
      function scoreMeta(score) {
        const n = Number(score);
        const safe = Number.isFinite(n) ? Math.max(0, Math.min(10, n)) : 0;
        let color = "var(--accent)";
        let label = "低風險";
        if (safe < 5) { color = "var(--danger)"; label = "高風險"; }
        else if (safe < 8) { color = "var(--warn)"; label = "中風險"; }
        return { value: Number.isFinite(n) ? n.toFixed(Number.isInteger(n) ? 0 : 1) : "-", width: `${safe * 10}%`, color, label };
      }
      function renderHead(item) {
        if (!item) { els.caseHead.innerHTML = `<div class="empty">沒有案例資料</div>`; return; }
        const s = item.summary || {};
        const summary = summaryKeys.map(([key, label]) => `<div class="summary-item"><span class="label">${esc(label)}</span><span class="value">${esc(fmt(s[key], key))}</span></div>`).join("");
        const badges = (item.modules || []).map(m => `<span class="pill score ${scoreClass(m.score)}">${esc(m.name)} ${esc(m.score || "-")}</span>`).join("");
        els.caseHead.innerHTML = `<h2>${esc(item.title)}</h2><div class="summary-grid">${summary}</div><div class="pillrow" style="margin-top:12px">${badges}</div>`;
      }
      function renderFilters(item) {
        const names = [...new Set((item?.modules || []).map(m => m.name))];
        els.filters.innerHTML = names.map(name => `<button class="filter ${name === state.activeModule ? "active" : ""}" data-module="${esc(name)}">${esc(name)}</button>`).join("");
        els.filters.querySelectorAll("[data-module]").forEach(button => button.addEventListener("click", () => {
          state.activeModule = button.dataset.module;
          renderModules(item);
          renderFilters(item);
        }));
      }
      function renderStatus(item, module) {
        const current = localStorage.getItem(storageKey(item.id, module.name, "status")) || statusOptions[0];
        const note = localStorage.getItem(storageKey(item.id, module.name, "note")) || "";
        return `<div class="status" data-scope="${esc(module.name)}">
          ${statusOptions.map(option => `<button class="${option === current ? "active" : ""}" data-status="${esc(option)}">${esc(option)}</button>`).join("")}
          <textarea placeholder="審閱註記">${esc(note)}</textarea>
        </div>`;
      }
      function renderSections(sections) {
        return (sections || []).map((section, index) => `<details class="section" ${index < 2 ? "open" : ""}><summary>${esc(section.title)}</summary><p>${esc(section.body)}</p></details>`).join("");
      }
      function flagLabel(value) {
        if (value === true) return "是";
        if (value === false) return "否";
        return "-";
      }
      function renderQuickReview(module) {
        const flags = module.flags || {};
        const tokens = module.tokens || {};
        const focus = module.chart?.focus || module.lossPattern || "-";
        const tokenText = tokens.total ? Number(tokens.total).toLocaleString("zh-TW") : "-";
        return `<div class="quick-review">
          <div class="check-chip ${flags.noRisk === false ? "warn" : ""}"><strong>風險判斷</strong><span>${esc(module.chart?.riskLevel || "-")} / 無風險：${esc(flagLabel(flags.noRisk))}</span></div>
          <div class="check-chip ${flags.isBlock ? "danger" : ""}"><strong>阻擋狀態</strong><span>${esc(flagLabel(flags.isBlock))}</span></div>
          <div class="check-chip ${flags.isMask ? "warn" : ""}"><strong>遮罩狀態</strong><span>${esc(flagLabel(flags.isMask))}</span></div>
          <div class="check-chip"><strong>驗測線索</strong><span>${esc(focus)} / Tokens ${esc(tokenText)}</span></div>
        </div>`;
      }
      function conditionValue(module, key) {
        if (module[key] != null) return module[key];
        const section = (module.sections || []).find(s => s.title === key);
        return section?.body || "-";
      }
      function renderCondition(module) {
        let comparison = module.EXPOSURE_COMPARISON || module.exposureComparison || {};
        if (!Object.keys(comparison).length) {
          const raw = (module.sections || []).find(s => s.title === "EXPOSURE_COMPARISON")?.body;
          if (raw) { try { comparison = typeof raw === "string" ? JSON.parse(raw) : raw; } catch (_) {} }
        }
        const allValues = ["AOP", "AOA", "APD", "AGG"].flatMap(name => { const i = comparison[name] || {}; return [i.case_amount, i.p75_amount, i.minimum_amount].map(v => Number(v) || 0); });
        const chartMax = Math.max(...allValues, 1);
        const rows = ["AOP", "AOA", "APD", "AGG"].map(name => {
          const item = comparison[name] || {};
          const values = [Number(item.case_amount) || 0, Number(item.p75_amount) || 0, Number(item.minimum_amount) || 0];
          return `<div class="bar-row"><span class="bar-label">${name}</span><div class="bar-stack">${values.map((v, i) => { const label = ["本案", "P75", "最小"][i]; return `<div class="bar ${["case", "p75", "minimum"][i]}" style="width:${Math.max(0, v / chartMax * 100)}%" data-tooltip="${label}：${v.toLocaleString("zh-TW")}"></div>`; }).join("")}</div></div>`;
        }).join("");
        const scale = [0, 20, 40, 60, 80, 100].map(p => `<span>${(chartMax * p / 100).toLocaleString("zh-TW")}</span>`).join("");
        const descriptions = [["AOP", "AOP_ASSESSMENT"], ["AOA", "AOA_ASSESSMENT"], ["APD", "APD_ASSESSMENT"], ["AGG", "AGG_ASSESSMENT"], ["自負額", "DEDUCTIBLE_ASSESSMENT"]];
        return `<div class="condition-meta"><div><strong>曝險程度</strong><br>${esc(conditionValue(module, "EXPOSURE_LEVEL"))}</div><div><strong>核心項目</strong><br>${esc(conditionValue(module, "CORE_FOCUS"))}</div></div><details class="section" open><summary>曝險程度對照圖</summary><div class="exposure-chart">${rows}<div class="chart-scale">${scale}</div><div class="chart-legend"><span><i class="legend-dot bar case"></i>本案</span><span><i class="legend-dot bar p75"></i>P75</span><span><i class="legend-dot bar minimum"></i>最小</span></div></div></details><table class="condition-table"><thead><tr><th>分析項目</th><th>說明</th></tr></thead><tbody>${descriptions.map(([label, key]) => `<tr><td>${label}</td><td>${esc(conditionValue(module, key))}</td></tr>`).join("")}</tbody></table>`;
      }
      function renderSubject(module) {
        const assessments = module.REVENUE_EXPOSURE_ASSESSMENTS || {};
        const rows = [
          ["營業合理性", module.REVENUE_REASONABILITY_CATEGORY || "-", module.REVENUE_REASONABILITY_DESCRIPTION || "-"],
          ["曝險特性", assessments.large_catering?.label ? `${assessments.large_catering.label}：${assessments.large_catering.level || "-"}` : "大型供餐型：-", module.REVENUE_EXPOSURE_DESCRIPTION || "-"],
          ["", assessments.continuous_use?.label ? `${assessments.continuous_use.label}：${assessments.continuous_use.level || "-"}` : "持續使用型：-", ""],
          ["", assessments.multi_channel_supply?.label ? `${assessments.multi_channel_supply.label}：${assessments.multi_channel_supply.level || "-"}` : "多通路／供應型：-", ""]
        ];
        return `<table class="subject-table"><thead><tr><th>分析項目</th><th>檢核結果</th><th>評估依據</th></tr></thead><tbody><tr><td>營業合理性</td><td class="subject-result">${esc(rows[0][1])}</td><td>${esc(rows[0][2])}</td></tr><tr><td rowspan="3">曝險特性</td><td class="subject-result">${esc(rows[1][1])}</td><td rowspan="3">${esc(rows[1][2])}</td></tr>${rows.slice(2).map(r => `<tr><td class="subject-result">${esc(r[1])}</td></tr>`).join("")}</tbody></table>`;
      }
      function richText(value) {
        return esc(value || "-").replace(/&lt;strong&gt;(.*?)&lt;\/strong&gt;/gs, "<strong>$1</strong>");
      }
      function renderHistory(module) {
        const facts = module.KEY_FACTS || {};
        const baseline = Array.isArray(facts.baseline) ? facts.baseline : [];
        const changes = Array.isArray(facts.change_trajectory) ? facts.change_trajectory : [];
        const reviews = Array.isArray(module.RECOMMENDED_REVIEW_CASES) ? module.RECOMMENDED_REVIEW_CASES : [];
        const factRows = [["過往脈絡", baseline.map((v, i) => `${i + 1}. ${v}`).join("\n")], ["變動重點", changes.map((v, i) => `${i + 1}. ${v}`).join("\n")]];
        return `<details class="section" open><summary>整體判讀</summary><div class="history-summary">${richText(module.OVERALL_ASSESSMENT)}</div></details><details class="section" open><summary>關鍵事實</summary><table class="history-table"><thead><tr><th>分析項目</th><th>說明</th></tr></thead><tbody>${factRows.map(r => `<tr><td>${esc(r[0])}</td><td>${richText(r[1])}</td></tr>`).join("")}</tbody></table></details><details class="section" open><summary>建議回看案件</summary><table class="review-table"><thead><tr><th>欄位</th><th>案件資料</th><th>回看重點</th></tr></thead><tbody>${reviews.map((r, reviewIndex) => { const alt = reviewIndex % 2 ? "review-alt" : ""; return `<tr class="${alt}"><td>進件編號</td><td>${esc(r.appllte_no || "-")}</td><td rowspan="3"><strong>建議確認：</strong>${richText(r.verification)}<br><strong>優先查看：</strong>${richText(r.fields_to_review)}</td></tr><tr class="${alt}"><td>報價單號</td><td>${esc(r.quote_no_version || "-")}</td></tr><tr class="${alt}"><td>保單號碼</td><td>${esc(r.policy_no || "-")}</td></tr>`; }).join("")}</tbody></table></details>`;
      }
      function renderModules(item) {
        if (!item) { els.modules.innerHTML = ""; return; }
        const list = (item.modules || []).filter(m => state.activeModule === "全部" || m.name === state.activeModule);
        els.modules.innerHTML = list.length ? list.map(module => {
          const meta = scoreMeta(module.score);
          return `<article class="module">
            <header class="module-head">
              <div><h3>${esc(module.name)}</h3><div class="pillrow" style="margin-top:8px">
                <span class="pill">版次：${esc(module.version || "-")}</span>
                <span class="pill">交付日：${esc(module.deliveryDate || "-")}</span>
                <span class="pill">理賠：${esc(module.claimSummary || "-")}</span>
              </div></div>
              <div class="score-panel">
                <div class="score-number">${esc(meta.value)}</div>
                <div class="score-track"><div class="score-fill" style="--score-width:${esc(meta.width)}; --score-color:${esc(meta.color)}"></div></div>
                <span class="pill score ${scoreClass(module.score)}">風險分數 ${esc(meta.label)}</span>
              </div>
            </header>
            ${renderQuickReview(module)}
            <div class="module-body">${module.name === "條件" ? renderCondition(module) : `${renderSections(module.sections)}${renderStatus(item, module)}`}</div>
          </article>`;
        }).join("") : `<div class="empty">此案例沒有模組資料</div>`;
        els.modules.querySelectorAll("[data-scope]").forEach(scope => {
          const moduleName = scope.dataset.scope;
          scope.querySelectorAll("[data-status]").forEach(button => button.addEventListener("click", () => {
            localStorage.setItem(storageKey(item.id, moduleName, "status"), button.dataset.status);
            renderModules(item);
          }));
          scope.querySelector("textarea")?.addEventListener("input", event => {
            localStorage.setItem(storageKey(item.id, moduleName, "note"), event.target.value);
          });
        });
      }
      function renderModules(item) {
        if (!item) { els.modules.innerHTML = ""; return; }
        const grouped = new Map();
        (item.modules || []).forEach(m => { if (!grouped.has(m.name)) grouped.set(m.name, []); grouped.get(m.name).push(m); });
        const list = [...grouped.entries()].filter(([name]) => state.activeModule === "?券" || name === state.activeModule);
        els.modules.innerHTML = list.length ? list.map(([name, versions], groupIndex) => {
          const selected = versions[0];
          const selectedScore = selected.score ?? selected.SCORE;
          const meta = scoreMeta(selectedScore);
          return `<article class="module" data-version-group="${groupIndex}"><header class="module-head"><div><h3>${esc(name)}</h3><div class="version-picker"><label>選擇版次</label><select class="version-select" data-version-select="${groupIndex}">${versions.map((m, i) => `<option value="${i}">${esc(m.version || `版次 ${i + 1}`)}</option>`).join("")}</select><span class="delivery-date">交付日期：${esc(selected.deliveryDate || "-")}</span></div></div><div class="score-panel"><div class="score-number" data-version-score="${groupIndex}">${esc(meta.value)}</div><div class="score-track"><div class="score-fill" data-version-fill="${groupIndex}" style="--score-width:${esc(meta.width)}; --score-color:${esc(meta.color)}"></div></div><span class="pill score ${scoreClass(selectedScore)}" data-version-label="${groupIndex}">${esc(meta.label)}</span></div></header><div class="module-body" data-version-body="${groupIndex}">${name === "條件" ? renderCondition(selected) : name === "標的" ? renderSubject(selected) : name === "歷史" ? renderHistory(selected) : renderSections(selected.sections)}${renderStatus(item, selected)}</div></article>`;
        }).join("") : `<div class="empty">目前沒有模組資料</div>`;
        els.modules.querySelectorAll("[data-version-select]").forEach(select => select.addEventListener("change", () => {
          const group = Number(select.dataset.versionSelect), versions = list[group][1], module = versions[Number(select.value)], moduleScore = module.score ?? module.SCORE, meta = scoreMeta(moduleScore);
          const card = select.closest(".module");
          card.querySelector(`[data-version-score="${group}"]`).textContent = meta.value;
          card.querySelector(`[data-version-fill="${group}"]`).style.setProperty("--score-width", meta.width);
          card.querySelector(`[data-version-fill="${group}"]`).style.setProperty("--score-color", meta.color);
          const label = card.querySelector(`[data-version-label="${group}"]`); label.textContent = meta.label; label.className = `pill score ${scoreClass(moduleScore)}`;
          card.querySelector(".delivery-date").textContent = `交付日期：${module.deliveryDate || "-"}`;
          card.querySelector(`[data-version-body="${group}"]`).innerHTML = `${module.name === "條件" ? renderCondition(module) : module.name === "標的" ? renderSubject(module) : module.name === "歷史" ? renderHistory(module) : renderSections(module.sections)}${renderStatus(item, module)}`;
        }));
      }
      function renderCompactList() {
        const list = filteredCases();
        els.count.textContent = `${list.length}/${cases.length}`;
        els.caseList.innerHTML = list.length ? list.map(item => {
          const s = item.summary || {};
          const names = [...new Set((item.modules || []).filter(m => m.inputs?.length || m.sections?.length || m.output || m.claimSummary).map(m => m.name))];
          return `<button class="case-btn ${item.id === state.activeCaseId ? "active" : ""}" data-id="${esc(item.id)}"><span class="case-title">${esc(s.CUSTOMER_NAME || item.title)}</span><span class="case-sub">APPLLTE_NO：${esc(s.APPLLTE_NO || item.appllteNo || "-")}</span><span class="case-modules">${names.map(n => `<span class="case-module">${esc(n)}</span>`).join("")}</span></button>`;
        }).join("") : `<div class="empty">No cases</div>`;
        els.caseList.querySelectorAll("[data-id]").forEach(button => button.addEventListener("click", () => { state.activeCaseId = button.dataset.id; state.activeModule = "?券"; render(); }));
      }
      function render() {
        const list = filteredCases();
        if (list.length && !list.some(item => item.id === state.activeCaseId)) state.activeCaseId = list[0].id;
        const item = activeCase();
        renderMeta();
        renderCompactList();
        renderHead(item);
        renderFilters(item);
        renderModules(item);
      }
      els.search.addEventListener("input", () => { state.query = els.search.value; render(); });
      document.getElementById("print").addEventListener("click", () => window.print());
      render();
    </script>
  </body>
</html>
