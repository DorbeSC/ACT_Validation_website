<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2.0 驗測結果審閱</title>
    <style>
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      :root {
        --sidebar-top: 100px;
        --bg: #f2f5f8;
        --panel: #fff;
        --ink: #1d2b3a;
        --muted: #607286;
        --line: #cfd9e4;
        --accent: #315f80;
        --accent-soft: #e5eff7;
        --warn: #a96300;
        --danger: #b4364d;
        --ok: #356b8c;
      }
      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
        font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", "Segoe UI", system-ui, sans-serif;
      }
      button, input, textarea { font: inherit; }
      button { cursor: pointer; }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 14px 22px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(8px);
      }
      h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.25; }
      .meta, .pillrow { display: flex; flex-wrap: wrap; gap: 8px; }
      .top-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-top: 10px; }
      .view-switch { display: flex; flex-wrap: wrap; gap: 8px; }
      .top-controls .meta { gap: 6px; }
      .top-controls .meta .pill { min-height: 24px; padding: 2px 8px; font-size: 12px; }
      .view-switch button { padding: 6px 10px; border: 1px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); font-size: 14px; }
      .view-switch button.active { border-color: var(--accent); background: var(--accent); color: #fff; }
      .pill, .tag {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 3px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--muted);
        font-size: 13px;
      }
      .attention-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .attention-tag { border-color: #f3bcc5; background: #fff0f2; color: var(--danger); }
      .actions { display: flex; gap: 10px; align-items: center; }
      .search {
        width: min(420px, 44vw);
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .btn {
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
      }
      #print { display: none; }
      .layout {
        display: grid;
        grid-template-columns: 245px minmax(0, 1fr);
        gap: 12px;
        padding: 12px;
      }
      .sidebar, .content, .case-head, .module {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .sidebar { position: sticky; top: var(--sidebar-top); align-self: start; height: calc(100vh - var(--sidebar-top) - 12px); max-height: calc(100vh - var(--sidebar-top) - 12px); overflow-y: auto; overflow-x: hidden; }
      .sidebar-head {
        position: sticky;
        top: 0;
        display: flex;
        justify-content: space-between;
        padding: 13px 14px;
        background: #fff;
        border-bottom: 1px solid var(--line);
      }
      .case-list { display: grid; gap: 5px; padding: 6px; }
      .case-btn {
        width: 100%;
        padding: 7px 8px;
        text-align: left;
        border: 1px solid transparent;
        border-radius: 6px;
        background: #f9fbfc;
      }
      .case-btn:hover, .case-btn.active { border-color: var(--accent); background: #dceaf5; }
      .case-btn.reviewed { border-color: #55ae82; background: #eef9f3; }
      .case-title { display: block; font-weight: 700; font-size: 13px; overflow-wrap: anywhere; }
      .case-sub { display: block; margin-top: 2px; color: var(--muted); font-size: 11px; overflow-wrap: anywhere; }
      .case-modules { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 5px; }
      .case-module { padding: 3px 7px; border: 1px solid #a9c5da; border-radius: 4px; background: #c9ddec; color: #244d6b; font-size: 11px; font-weight: 700; }
      .module-tag-badge { display: block; max-width: 100%; margin-top: 5px; padding: 3px 7px; border: 1px solid #f3bcc5; border-radius: 5px; background: #fff0f2; color: var(--danger); font-size: 11px; line-height: 1.35; overflow-wrap: anywhere; }
      .reviewed-mark { display: block; max-width: 100%; margin-top: 5px; padding: 4px 8px; border-radius: 999px; background: #50b783; color: #fff; font-size: 11px; line-height: 1.35; font-weight: 700; overflow-wrap: anywhere; }
      .condition-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 14px; }
      .condition-meta > div { padding: 10px; background: #f8fafb; }
      .exposure-chart { padding: 12px 8px; border: 1px solid var(--line); background: #fff; }
      .bar-row { display: grid; grid-template-columns: 42px 1fr; gap: 8px; align-items: center; margin: 17px 0; }
      .bar-label { color: var(--muted); font-size: 12px; }
      .bar-stack { display: grid; gap: 5px; background: repeating-linear-gradient(to right, transparent 0, transparent calc(20% - 1px), #edf1f4 calc(20% - 1px), #edf1f4 20%); }
      .bar { position: relative; height: 10px; min-width: 2px; border-radius: 5px; }
      .bar::after { content: attr(data-tooltip); position: absolute; left: 0; bottom: 15px; z-index: 3; display: none; padding: 5px 8px; border-radius: 4px; background: #17212b; color: #fff; white-space: nowrap; font-size: 11px; font-weight: 500; pointer-events: none; }
      .bar:hover::after { display: block; }
      .bar.case { background: #8bd5b0; } .bar.p75 { background: #ff8d8d; } .bar.minimum { background: #76b7ed; }
      .chart-legend { display: flex; gap: 14px; margin-top: 12px; color: var(--muted); font-size: 12px; }
      .chart-scale { display: grid; grid-template-columns: repeat(6, 1fr); margin-left: 50px; color: var(--muted); font-size: 10px; }
      .chart-scale span { text-align: right; }
      .legend-dot { display: inline-block; width: 10px; height: 7px; margin-right: 4px; border-radius: 4px; }
      .condition-table { table-layout: fixed; }
      .condition-table th:first-child, .condition-table td:first-child { width: 85px; max-width: 85px; white-space: nowrap; color: var(--muted); font-weight: 700; }
      .condition-table th:nth-child(2), .condition-table td:nth-child(2) { width: auto; }
      .condition-clause-title { margin: 18px 0 6px; color: var(--ink); font-size: 16px; font-weight: 800; }
      .condition-clause-subtitle { margin: 0 0 8px; color: var(--muted); }
      .condition-clause-summary { margin: 0 0 14px; color: var(--muted); white-space: pre-wrap; line-height: 1.6; }
      .condition-clause-table { margin-bottom: 14px; }
      .subject-table th, .subject-table td { text-align: left; color: var(--ink); }
      .subject-table th:first-child, .subject-table td:first-child { width: calc(5em + 26px); max-width: calc(5em + 26px); white-space: nowrap; color: var(--ink); font-weight: 700; }
      .subject-table th:nth-child(2), .subject-table td:nth-child(2) { width: 20px; max-width: 20px; white-space: nowrap; }
      .subject-table td:nth-child(3) { line-height: 1.7; }
      .subject-result { color: var(--ink) !important; font-weight: 700; }
      .history-summary { padding: 12px; border: 1px solid var(--line); border-radius: 6px; line-height: 1.75; white-space: pre-wrap; }
      .history-table { width: 100%; table-layout: auto; }
      .history-table th:first-child, .history-table td:first-child { width: 180px; min-width: 180px; max-width: 180px; white-space: nowrap; font-weight: 700; }
      .history-table th:nth-child(2), .history-table td:nth-child(2) { width: auto; }
      .history-table td { line-height: 1.7; white-space: pre-wrap; }
      .review-table { width: 100%; table-layout: auto; }
      .review-table th:first-child, .review-table td:first-child { width: 200px; min-width: 200px; white-space: nowrap; font-weight: 700; }
      .review-table th:nth-child(2), .review-table td:nth-child(2) { width: 260px; min-width: 260px; white-space: nowrap; }
      .review-table th:nth-child(3), .review-table td:nth-child(3) { width: auto; }
      .review-table td { line-height: 1.65; white-space: pre-wrap; }
      .review-table tr.review-alt td { background: #f0f1f2; }
      .version-picker { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
      .version-picker label { color: var(--muted); font-size: 12px; }
      .delivery-date { color: var(--muted); font-size: 12px; }
      .version-select { padding: 6px 9px; border: 1px solid var(--line); border-radius: 5px; background: #fff; }
      @media (max-width: 620px) { .condition-meta { grid-template-columns: 1fr; } }
      .content { padding: 16px; }
      .context-sticky { position: sticky; top: var(--sidebar-top); z-index: 3; display: grid; grid-template-columns: minmax(180px, 240px) minmax(0, 1fr); grid-template-rows: auto; align-items: center; column-gap: 12px; row-gap: 10px; margin-bottom: 14px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); box-shadow: 0 3px 8px rgba(29, 43, 58, .08); isolation: isolate; }
      .context-sticky::before { content: ""; position: absolute; left: -16px; right: -16px; bottom: 100%; height: var(--sidebar-top); background: var(--panel); pointer-events: none; }
      .case-head { display: contents; }
      .case-head h2 { grid-column: 1; grid-row: 1; margin: 0; overflow: hidden; font-size: 24px; line-height: 1.3; white-space: nowrap; text-overflow: ellipsis; }
      .case-head > .pillrow { display: none; }
      .summary-grid {
        display: grid;
        grid-template-columns: 120px 180px repeat(6, minmax(0, 1fr));
        gap: 4px;
      }
      .summary-item { min-width: 0; padding: 4px 6px; border: 1px solid var(--line); border-radius: 5px; background: #fbfcfd; }
      .label { display: block; overflow: hidden; color: var(--muted); font-size: 10px; white-space: nowrap; text-overflow: ellipsis; }
      .value { display: block; margin-top: 1px; overflow: hidden; font-size: 14px; font-weight: 700; white-space: nowrap; text-overflow: ellipsis; }
      .filters { grid-column: 2; grid-row: 1; align-self: center; display: flex; flex-wrap: wrap; gap: 8px; width: 100%; margin: 0; background: transparent; }
      .case-summary { grid-column: 1 / -1; grid-row: 2; min-width: 0; padding: 0; margin: 0; background: transparent; }
      .filter {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 12px;
        font-size: 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .filter.active { border-color: var(--accent); background: var(--accent-soft); color: var(--accent); }
      .filter[data-module="歷史"] { border-color: #9bb7cc; background: #e7eff5; color: #31566f; }
      .filter[data-module="條件"] { border-color: #8fb9b8; background: #e5f1f0; color: #286267; }
      .filter[data-module="標的"] { border-color: #b4add0; background: #eeeaf7; color: #554b7b; }
      .filter[data-module="客戶"], .filter[data-module="客戶風險"] { border-color: #d8b18c; background: #fff3e8; color: #8a5429; }
      .filter[data-module="web search"] { border-color: #aeb8c4; background: #eef1f4; color: #465565; }
      .filter[data-module="歷史"].active, .filter[data-module="條件"].active, .filter[data-module="標的"].active, .filter[data-module="客戶"].active, .filter[data-module="客戶風險"].active, .filter[data-module="web search"].active { box-shadow: inset 0 0 0 2px currentColor; }
      .filter-judge, .version-judge-result { padding: 2px 6px; border-radius: 4px; background: #e9eef2; color: #53616c; font-size: 11px; font-weight: 800; white-space: nowrap; }
      .filter-judge.pass, .version-judge-result.pass { background: #d8f2e2; color: #176b49; }
      .filter-judge.fail, .version-judge-result.fail { background: #f8d9de; color: #a52e49; }
      .filter-judge.mixed { background: #f8ecd0; color: #8b5c00; }
      .version-judge-list { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-top: 8px; }
      .version-judge-list-label { color: var(--muted); font-size: 12px; }
      .version-judge-chip { padding: 3px 7px; border: 1px solid #c9d3da; border-radius: 4px; background: #f1f4f6; color: #53616c; font-size: 11px; font-weight: 800; }
      .version-judge-chip.pass { border-color: #b8dfca; background: #d8f2e2; color: #176b49; }
      .version-judge-chip.fail { border-color: #efc2c2; background: #f8d9de; color: #a52e49; }
      .version-judge-chip.selected { box-shadow: inset 0 0 0 2px currentColor; }
      .modules { display: grid; gap: 14px; }
      .module { overflow: hidden; }
      .module-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 14px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfd;
      }
      .module h3 { margin: 0; font-size: 19px; }
      .score { color: #fff; background: var(--accent); }
      .score.mid { background: var(--warn); }
      .score.high { background: var(--danger); }
      .score-panel {
        display: grid;
        align-content: center;
        gap: 7px;
        min-width: 0;
      }
      .web-search-score { display: none; }
      .score-number {
        font-size: 24px;
        font-weight: 800;
        text-align: right;
      }
      .score-track {
        height: 9px;
        overflow: hidden;
        border-radius: 5px;
        background: #e8edf2;
      }
      .score-fill {
        width: var(--score-width);
        height: 100%;
        background: var(--score-color);
      }
      .module-body { display: block; padding: 16px; }
      .report-summary { display: grid; grid-template-columns: minmax(150px, 210px) minmax(0, 1fr); gap: 14px; }
      .report-risk-card, .report-summary-card { padding: 16px; border: 1px solid var(--line); border-radius: 6px; background: #fbfcfd; }
      .report-card-label { margin-bottom: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }
      .report-risk-value { font-size: 36px; font-weight: 800; line-height: 1; }
      .report-risk-value small { color: var(--muted); font-size: 15px; font-weight: 600; }
      .report-risk-level { display: inline-flex; margin-top: 10px; padding: 4px 8px; border-radius: 5px; background: var(--accent); color: #fff; font-size: 12px; font-weight: 800; }
      .report-risk-level.mid { background: var(--warn); }
      .report-risk-level.high { background: var(--danger); }
      .report-summary-card p { margin: 0; line-height: 1.75; white-space: pre-wrap; }
      @media (max-width: 620px) { .report-summary { grid-template-columns: 1fr; } }
      .quick-review {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 0 16px 16px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfd;
      }
      .check-chip {
        min-height: 54px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 6px;
        background: #fff;
      }
      .check-chip.warn { border-left-color: var(--warn); }
      .check-chip.danger { border-left-color: var(--danger); }
      .check-chip strong { display: block; font-size: 13px; }
      .check-chip span { display: block; margin-top: 3px; color: var(--muted); font-size: 12px; overflow-wrap: anywhere; }
      table { width: 100%; border-collapse: collapse; font-size: 14px; }
      th, td { padding: 8px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
      th { width: 42%; color: var(--muted); font-weight: 600; }
      .section {
        margin-bottom: 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .section summary {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        color: var(--ink);
        font-weight: 800;
        list-style: none;
        cursor: pointer;
      }
      .section summary::-webkit-details-marker { display: none; }
      .section summary::after { content: "展開"; color: var(--muted); font-size: 12px; font-weight: 500; }
      .section[open] summary::after { content: "收合"; }
      .section p { margin: 0; padding: 0 12px 12px; line-height: 1.72; white-space: pre-wrap; }
      .status { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 34px; padding-top: 14px; border-top: 1px solid var(--line); }
      .status button {
        padding: 6px 9px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
      }
      .status button.active { border-color: var(--accent); background: var(--accent-soft); }
      .status .status-submit { margin-left: auto; border-color: var(--accent); background: var(--accent); color: #fff; cursor: pointer; font-weight: 700; }
      .status .status-submit:hover { filter: brightness(.95); }
      .status .status-update { border-color: var(--accent); color: var(--accent); background: #fff; cursor: pointer; }
      .status .status-update:hover { background: var(--accent-soft); }
      .status .status-clear { border-color: #c87979; color: #a64b4b; background: #fff; cursor: pointer; }
      .status .status-clear:hover { background: #fff1f1; }
      .module-tag-editor { flex-basis: 100%; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-top: 2px; }
      .module-tag-editor label { color: var(--danger); font-size: 13px; font-weight: 700; white-space: nowrap; }
      .module-tag-input { flex: 1 1 360px; min-width: 220px; padding: 5px 8px; border: 1px solid #e4b8bf; border-radius: 5px; background: #fff; color: var(--ink); font-size: 13px; line-height: 1.4; }
      .module-tag-hint { color: var(--muted); font-size: 12px; }
      .feedback-grid { flex-basis: 100%; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
      .feedback-grid textarea { width: 100%; height: 180px; min-height: 180px; }
      .feedback-summary { flex-basis: 100%; }
      .reviewed-badge { color: #23865a; font-size: 13px; font-weight: 700; }
      .local-only-note { flex-basis: 100%; color: var(--muted); font-size: 12px; line-height: 1.5; }
      .ai-judge-card { margin: 18px 0 16px; border: 1px solid #c9dbe8; border-radius: 8px; overflow: hidden; background: #f7fbfe; }
      .ai-judge-card > summary { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; list-style: none; cursor: pointer; }
      .ai-judge-card > summary::-webkit-details-marker { display: none; }
      .ai-judge-card > summary::after { content: "展開"; color: var(--muted); font-size: 12px; }
      .ai-judge-card[open] > summary::after { content: "收合"; }
      .ai-judge-title { color: var(--accent); font-size: 16px; font-weight: 800; }
      .ai-judge-overview { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 7px; align-items: center; }
      .ai-judge-decision, .ai-judge-score { display: inline-flex; align-items: center; min-height: 26px; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 800; }
      .ai-judge-decision { color: var(--muted); background: #eef2f5; }
      .ai-judge-decision.pass { color: #19764f; background: #e6f6ee; }
      .ai-judge-decision.fail { color: #a43636; background: #fdeaea; }
      .ai-judge-score { color: var(--accent); background: #e8f1f8; }
      .ai-judge-body { padding: 14px; border-top: 1px solid #c9dbe8; }
      .ai-judge-final-result { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 10px; padding: 12px 14px; border: 1px solid #c9dbe8; border-left: 6px solid #9aa8b3; border-radius: 6px; background: #fff; }
      .ai-judge-final-result.pass { border-color: #b8dfca; border-left-color: #23865a; background: #f1fbf5; }
      .ai-judge-final-result.fail { border-color: #efc2c2; border-left-color: #b73550; background: #fff5f5; }
      .ai-judge-final-label { color: var(--ink); font-size: 15px; font-weight: 800; }
      .ai-judge-final-context { margin-top: 3px; color: var(--muted); font-size: 12px; }
      .ai-judge-final-value { min-width: 86px; padding: 6px 12px; border-radius: 6px; color: #53616c; background: #e9eef2; text-align: center; font-size: 22px; font-weight: 900; letter-spacing: .3px; }
      .ai-judge-final-value.pass { color: #176b49; background: #d8f2e2; }
      .ai-judge-final-value.fail { color: #a52e49; background: #f8d9de; }
      .ai-judge-metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .ai-judge-metric { padding: 10px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
      .ai-judge-metric-head { display: flex; justify-content: space-between; gap: 8px; color: var(--muted); font-size: 12px; }
      .ai-judge-metric-value { color: var(--ink); font-size: 18px; font-weight: 800; }
      .ai-judge-meter { height: 6px; margin-top: 7px; overflow: hidden; border-radius: 4px; background: #e8edf2; }
      .ai-judge-meter-fill { width: var(--judge-width); height: 100%; background: var(--accent); }
      .ai-judge-reason { margin-top: 10px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; background: #fff; }
      .ai-judge-reason-label, .ai-judge-feedback-title { color: var(--ink); font-size: 13px; font-weight: 800; }
      .ai-judge-reason-text { margin: 5px 0 0; color: var(--muted); line-height: 1.65; white-space: pre-wrap; }
      .ai-judge-feedback { margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line); }
      .ai-judge-feedback-options { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }
      .ai-judge-feedback-options button { padding: 6px 10px; border: 1px solid #b8ccd9; border-radius: 6px; background: #fff; color: var(--ink); cursor: pointer; }

  <body>
    <header class="topbar">
      <div>
        <h1>2.0智能助理驗測平台</h1>
        <div class="top-controls">
          <div class="view-switch" aria-label="頁面切換">
            <button type="button" id="reviewViewButton" class="active">驗測介面</button>
            <button type="button" id="usageViewButton">token＆時間＆成本紀錄</button>
          </div>
          <div class="meta" id="meta"></div>
        </div>
      </div>
      <div class="actions">
        <input class="search" id="search" type="search" placeholder="搜尋客戶、進件編號、標的或模組內容" />
        <button class="btn" id="print" type="button">列印</button>
        <button class="btn" id="downloadExcel" type="button">下載 Excel</button>
      </div>
    </header>
    <div class="layout" id="reviewLayout">
      <aside class="sidebar">
        <div class="sidebar-head"><strong>案例清單</strong><span id="count"></span></div>
        <div class="case-list" id="caseList"></div>
      </aside>
      <main class="content">
        <div class="context-sticky">
          <section class="case-head" id="caseHead"></section>
          <nav class="filters" id="filters"></nav>
          <section class="case-summary" id="caseSummary"></section>
        </div>
        <section class="modules" id="modules"></section>
      </main>
    </div>
    <section class="usage-view" id="usageView" hidden></section>
    <script>document.write('<script src="./validation-review-data-new.js?v=' + Date.now() + '"><\/script>');</script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script>
      const data = window.validationReviewData || {};
      const cases = Array.isArray(data.cases) ? data.cases : [];
      const state = { query: "", activeCaseId: cases[0]?.id || "", activeModule: "全部", view: "review" };
      const summaryKeys = [
        ["CUSTOMER_ID", "客戶 ID"], ["APPLLTE_NO", "進件編號"], ["OBJECT_NAME", "承接標的"],
        ["REVENUE", "營業額"], ["AOP_AMOUNT_PRODUCT", "每一人身體傷害"], ["AOA_AMOUNT_PRODUCT", "每一事故身體傷害"],
        ["APD_AMOUNT_PRODUCT", "每一事故財物損失"], ["AGG_AMOUNT_PRODUCT", "保險期間累計"]
      ];
      const statusOptions = ["已確認並回饋在excel"];
      const aiJudgeFeedbackOptions = ["認同", "部分認同", "不認同", "尚未確認"];
      const els = {
        meta: document.getElementById("meta"), search: document.getElementById("search"), count: document.getElementById("count"),
        caseList: document.getElementById("caseList"), caseHead: document.getElementById("caseHead"), caseSummary: document.getElementById("caseSummary"),
        filters: document.getElementById("filters"), modules: document.getElementById("modules"), reviewLayout: document.getElementById("reviewLayout"),
        usageView: document.getElementById("usageView"), reviewViewButton: document.getElementById("reviewViewButton"), usageViewButton: document.getElementById("usageViewButton")
      };
      function syncSidebarLayout() {
        const topbar = document.querySelector(".topbar");
        const topOffset = (topbar?.getBoundingClientRect().height || 0) + 12;
        document.documentElement.style.setProperty("--sidebar-top", `${topOffset}px`);
      }
      window.addEventListener("resize", syncSidebarLayout);
      syncSidebarLayout();
      function esc(v) {
        return String(v ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[c]));
      }
      function fmt(v, key = "") {
        const s = String(v ?? "");
        if (!s) return "-";
        if (/AMOUNT|REVENUE|DDCB/.test(key) && !Number.isNaN(Number(s))) return Number(s).toLocaleString("zh-TW");
        return s;
      }
      function customerDisplay(item) {
        const summary = item?.summary || {};
        const customerId = String(summary.CUSTOMER_ID ?? "").trim();
        const isNaturalPerson = customerId !== "" && !/^\d{8}$/.test(customerId);
        return {
          id: isNaturalPerson ? "自然人ID" : summary.CUSTOMER_ID,
          name: isNaturalPerson ? "自然人姓名" : (summary.CUSTOMER_NAME || item?.title || "-")
        };
      }
      function aiJudgeField(module, field) {
        const nested = module?.AI_JUDGE || module?.aiJudge || module?.ai_judge;
        if (nested && Object.prototype.hasOwnProperty.call(nested, field)) return nested[field];
        return module?.[field];
      }
      function aiJudgeText(value, fallback = "-") {
        if (value === null || value === undefined || String(value).trim() === "") return fallback;
        return String(value);
      }
      function aiJudgeDecisionLabel(value) {
        return aiJudgeText(value, "-");
      }
      function aiJudgeDecisionClass(value) {
        const normalized = String(value ?? "").trim().toLowerCase();
        if (["pass", "passed", "通過"].includes(normalized)) return "pass";
        if (["fail", "failed", "需複核", "不通過"].includes(normalized)) return "fail";
        return "";
      }
      function aiJudgeFinalLabel(value) {
        return aiJudgeText(value, "-");
      }
      function judgeResultInfo(module) {
        const raw = aiJudgeField(module, "overall_decision");
        return { value: aiJudgeText(raw, "-"), className: aiJudgeDecisionClass(raw) };
      }
      function moduleJudgeSummary(item, name) {
        if (name === "web search") return { value: "", className: "" };
        const results = new Map();
        (item?.modules || []).filter(module => module.name === name).forEach(module => {
          const info = judgeResultInfo(module);
          if (info.value !== "-" && !results.has(info.value)) results.set(info.value, info.className);
        });
        const values = [...results.keys()];
        return { value: values.length ? values.join(" / ") : "-", className: values.length === 1 ? (results.get(values[0]) || "") : values.length > 1 ? "mixed" : "" };
      }
      function renderVersionJudgeResult(module, groupIndex) {
        const info = judgeResultInfo(module);
        return `<span class="version-judge-result ${info.className}" data-version-judge="${groupIndex}">Judge：${esc(info.value)}</span>`;
      }
      function renderVersionJudgeList(versions, groupIndex) {
        const judgedVersions = versions.map((module, index) => ({ module, index, info: judgeResultInfo(module) })).filter(item => item.info.value !== "-");
        if (!judgedVersions.length) return "";
        return `<div class="version-judge-list"><span class="version-judge-list-label">各版次 Judge 結果</span>${judgedVersions.map(({ module, index, info }) => { const version = module.version || `版次 ${index + 1}`; return `<span class="version-judge-chip ${info.className} ${index === 0 ? "selected" : ""}" data-version-judge-option="${groupIndex}" data-version-judge-index="${index}">${esc(version)}：${esc(info.value)}</span>`; }).join("")}</div>`;
      }
      function aiJudgeMetric(label, value) {
        const n = Number(value);
        const width = Number.isFinite(n) ? `${Math.max(0, Math.min(5, n)) / 5 * 100}%` : "0%";
        return `<div class="ai-judge-metric"><div class="ai-judge-metric-head"><span>${esc(label)}</span><span class="ai-judge-metric-value">${esc(aiJudgeText(value))}<small>/5</small></span></div><div class="ai-judge-meter"><div class="ai-judge-meter-fill" style="--judge-width:${esc(width)}"></div></div></div>`;
      }
      function renderAiJudge(item, module) {
        const decisionRaw = aiJudgeField(module, "overall_decision");
        const decision = aiJudgeDecisionLabel(decisionRaw);
        const decisionClass = aiJudgeDecisionClass(decisionRaw);
        const finalResult = aiJudgeFinalLabel(decisionRaw);
        const overallScore = aiJudgeText(aiJudgeField(module, "overall_score"));
        const reason = aiJudgeText(aiJudgeField(module, "reason"), "目前尚無 AI Judge 原因說明。");
        const version = moduleVersion(module);
        const feedback = localStorage.getItem(storageKey(item.id, module.name, "aiJudgeFeedback", version)) || "";
        const feedbackNote = localStorage.getItem(storageKey(item.id, module.name, "aiJudgeFeedbackNote", version)) || "";
        return `<details class="ai-judge-card" open><summary><span class="ai-judge-title">AI Judge 初步驗測</span><span class="ai-judge-overview"><span class="ai-judge-decision ${decisionClass}">${esc(decision)}</span><span class="ai-judge-score">整體分數 ${esc(overallScore)} / 5</span></span></summary><div class="ai-judge-body"><div class="ai-judge-final-result ${decisionClass}"><div><div class="ai-judge-final-label">Judge 最終結果</div><div class="ai-judge-final-context">${esc(moduleLabel(module.name))}／版次：${esc(version)}</div></div><span class="ai-judge-final-value ${decisionClass}">${esc(finalResult)}</span></div><div class="ai-judge-metrics">${aiJudgeMetric("正確性", aiJudgeField(module, "correctness"))}${aiJudgeMetric("完整性", aiJudgeField(module, "completeness"))}${aiJudgeMetric("幻覺", aiJudgeField(module, "hallucination_control"))}</div><div class="ai-judge-reason"><div class="ai-judge-reason-label">原因</div><p class="ai-judge-reason-text">${esc(reason)}</p></div><div class="ai-judge-feedback"><div class="ai-judge-feedback-title">請回饋 AI Judge 的評分結果</div><div class="ai-judge-feedback-options">${aiJudgeFeedbackOptions.map(option => `<button type="button" class="${option === feedback ? "active" : ""}" data-ai-judge-feedback="${esc(option)}">${esc(option)}</button>`).join("")}</div><textarea class="ai-judge-feedback-note" data-ai-judge-feedback-note placeholder="請補充原因或需要人工修正的地方">${esc(feedbackNote)}</textarea><div class="ai-judge-feedback-hint">回饋會保存於本機，下載 Excel 時一併匯出。</div></div></div></details>`;
      }
      function moduleTag(item, module) {
        if (!item || !module) return "";
        return localStorage.getItem(storageKey(item.id, module.name, "tag", moduleVersion(module))) || "";
      }
      function moduleLabel(name) {
        return name === "客戶" || name === "客戶風險" ? "客戶風險" : name;
      }
      function createReportModule(item) {
        const existing = (item?.modules || []).find(module => module.name === "報告");
        if (existing) return { ...existing, name: "報告", riskSummary: existing.final_summary ?? existing.FINAL_SUMMARY ?? existing.riskSummary ?? "-" };
        const sourceByName = new Map();
        (item?.modules || []).filter(module => module.name !== "報告").forEach(module => {
          if (!sourceByName.has(module.name)) sourceByName.set(module.name, module);
        });
        const source = [...sourceByName.values()];
        const scored = source.map(module => ({ name: moduleLabel(module.name), score: Number(module.score ?? module.SCORE) })).filter(module => Number.isFinite(module.score));
        const score = scored.length ? scored.reduce((total, module) => total + module.score, 0) / scored.length : null;
        const priority = [...scored].sort((a, b) => a.score - b.score).slice(0, 3);
        const highRisk = priority.filter(module => module.score < 5);
        const mediumRisk = priority.filter(module => module.score >= 5 && module.score < 8);
        const summaryParts = [];
        if (!scored.length) summaryParts.push("目前各模組尚無可彙整的風險分數，建議先確認模組資料是否完整。");
        else if (highRisk.length) summaryParts.push(`高風險重點為${highRisk.map(module => `${module.name}（${module.score} 分）`).join("、")}，建議優先人工複核。`);
        else if (mediumRisk.length) summaryParts.push(`目前主要關注項目為${mediumRisk.map(module => `${module.name}（${module.score} 分）`).join("、")}，建議依序確認相關評估內容。`);
        else summaryParts.push("目前各模組整體呈低風險，未發現需要優先處理的高風險項目。");
        summaryParts.push(`本摘要彙整 ${source.length} 個既有模組${scored.length !== source.length ? `，其中 ${scored.length} 個提供有效分數` : ""}。`);
        return { name: "報告", score, riskSummary: summaryParts.join("\n") };
      }
      function reportModules(item) {
        if ((item?.modules || []).some(module => module.name === "報告")) return item.modules;
        return [...(item?.modules || []), createReportModule(item)];
      }
      function isCustomerRiskModule(name) {
        return name === "客戶" || name === "客戶風險";
      }
      function moduleTags(item) {
        return (item?.modules || []).map(module => moduleTag(item, module)).filter(Boolean).join(" ");
      }
      function filteredCases() {
        const q = state.query.trim().toLowerCase();
        if (!q) return cases;
        return cases.filter(item => {
          const summary = Object.values(item.summary || {}).join(" ");
          const modules = (item.modules || []).map(m => `${m.name} ${m.output} ${m.claimSummary}`).join(" ");
          return `${item.title} ${summary} ${modules} ${(item.modules || []).map(m => moduleLabel(m.name)).join(" ")} ${moduleTags(item)}`.toLowerCase().includes(q);
        });
      }
      function activeCase() {
        return cases.find(item => item.id === state.activeCaseId) || cases[0];
      }
      function renderUsageView() {
        const num = value => Number.isFinite(Number(value)) ? Number(value) : 0;
        const money = value => num(value).toLocaleString("zh-TW", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const latest = new Map();
        cases.forEach(item => {
          const caseNo = item.summary?.APPLLTE_NO || item.appllteNo || item.id || "-";
          (item.modules || []).forEach(module => {
            const key = `${caseNo}::${module.name || "未分類"}`;
            const date = module.deliveryDate || module.DELIVERY_DATE || "";
            const old = latest.get(key);
            if (!old || (Date.parse(date) || 0) >= (Date.parse(old.deliveryDate) || 0)) latest.set(key, { item, module, caseNo, deliveryDate: date });
          });
        });
        const moduleRows = [...latest.values()].map(({ item, module, caseNo, deliveryDate }) => {
          const tokens = module.tokens || {};
          const input = num(tokens.input ?? module.INPUT_TOKENS);
          const output = num(tokens.output ?? module.OUTPUT_TOKENS);
          const total = num(tokens.total ?? module.TOTAL_TOKENS) || input + output;
          const webSearchApiFee = module.name === "web search" ? 1 : 0;
          return { item, module, caseNo, deliveryDate, input, output, total, gpt55: input * 0.00016 + output * 0.000960 + webSearchApiFee, luna: input * 0.00003 + output * 0.00018 + webSearchApiFee };
        });
        const aggregateByCase = source => {
          const byCase = new Map();
          source.forEach(row => {
            if (!byCase.has(row.caseNo)) byCase.set(row.caseNo, { ...row, modules: 1, moduleNames: [row.module.name || "未分類"] });
            else {
              const target = byCase.get(row.caseNo);
              ["input", "output", "total", "gpt55", "luna"].forEach(key => target[key] += row[key]);
              target.modules += 1;
              if (!target.moduleNames.includes(row.module.name || "未分類")) target.moduleNames.push(row.module.name || "未分類");
              if ((Date.parse(row.deliveryDate) || 0) > (Date.parse(target.deliveryDate) || 0)) target.deliveryDate = row.deliveryDate;
            }
          });
          return [...byCase.values()];
        };
        const caseRows = aggregateByCase(moduleRows);
        const stat = key => {
          const values = caseRows.map(row => row[key]);
          if (!values.length) return { avg: 0, max: 0, min: 0 };
          return { avg: values.reduce((a, b) => a + b, 0) / values.length, max: Math.max(...values), min: Math.min(...values) };

          ["營業合理性", module.REVENUE_REASONABILITY_CATEGORY || "-", module.REVENUE_REASONABILITY_DESCRIPTION || "-"],
          ["曝險特性", assessments.large_catering?.label ? `${assessments.large_catering.label}：${assessments.large_catering.level || "-"}` : "大型供餐型：-", module.REVENUE_EXPOSURE_DESCRIPTION || "-"],
          ["", assessments.continuous_use?.label ? `${assessments.continuous_use.label}：${assessments.continuous_use.level || "-"}` : "持續使用型：-", ""],
          ["", assessments.multi_channel_supply?.label ? `${assessments.multi_channel_supply.label}：${assessments.multi_channel_supply.level || "-"}` : "多通路／供應型：-", ""]
        ];
        return `<table class="subject-table"><thead><tr><th>分析項目</th><th>檢核結果</th><th>評估依據</th></tr></thead><tbody><tr><td>營業合理性</td><td class="subject-result">${esc(rows[0][1])}</td><td>${esc(rows[0][2])}</td></tr><tr><td rowspan="3">曝險特性</td><td class="subject-result">${esc(rows[1][1])}</td><td rowspan="3">${esc(rows[1][2])}</td></tr>${rows.slice(2).map(r => `<tr><td class="subject-result">${esc(r[1])}</td></tr>`).join("")}</tbody></table>`;
      }
      function richText(value) {
        return esc(value || "-").replace(/&lt;strong&gt;(.*?)&lt;\/strong&gt;/gs, "<strong>$1</strong>");
      }
      function renderAttentionTags(module) {
        const tags = Array.isArray(module?.ATTENTION_TAGS) ? module.ATTENTION_TAGS.filter(Boolean) : [];
        return tags.map(tag => `<span class="tag attention-tag">${esc(tag)}</span>`).join("");
      }
      function renderHistory(module) {
        const facts = module.KEY_FACTS || {};
        const baseline = Array.isArray(facts.baseline) ? facts.baseline : [];
        const changes = Array.isArray(facts.change_trajectory) ? facts.change_trajectory : [];
        const reviews = Array.isArray(module.RECOMMENDED_REVIEW_CASES) ? module.RECOMMENDED_REVIEW_CASES : [];
        const factRows = [["過往脈絡", baseline.map((v, i) => `${i + 1}. ${v}`).join("\n")], ["變動重點", changes.map((v, i) => `${i + 1}. ${v}`).join("\n")]];
        return `<details class="section" open><summary>整體判讀</summary><div class="history-summary">${richText(module.OVERALL_ASSESSMENT)}</div></details><details class="section" open><summary>關鍵事實</summary><table class="history-table"><thead><tr><th>分析項目</th><th>說明</th></tr></thead><tbody>${factRows.map(r => `<tr><td>${esc(r[0])}</td><td>${richText(r[1])}</td></tr>`).join("")}</tbody></table></details><details class="section" open><summary>建議回看案件</summary><table class="review-table"><thead><tr><th>欄位</th><th>案件資料</th><th>回看重點</th></tr></thead><tbody>${reviews.map((r, reviewIndex) => { const alt = reviewIndex % 2 ? "review-alt" : ""; return `<tr class="${alt}"><td>進件編號</td><td>${esc(r.appllte_no || "-")}</td><td rowspan="3"><strong>建議確認：</strong>${richText(r.verification)}<br><strong>優先查看：</strong>${richText(r.fields_to_review)}</td></tr><tr class="${alt}"><td>報價單號</td><td>${esc(r.quote_no_version || "-")}</td></tr><tr class="${alt}"><td>保單號碼</td><td>${esc(r.policy_no || "-")}</td></tr>`; }).join("")}</tbody></table></details>`;
      }
      function renderCustomerRisk(module) {
        const value = field => module[field] == null || module[field] === "" ? "-" : module[field];
        return `<details class="section" open><summary>店面照片辨識</summary><p><strong>店面照片</strong><br>${esc(value("SP_SUMMARY"))}</p></details><details class="section" open><summary>CoPlus裁罰紀錄</summary><p><strong>裁罰概況</strong><br>${esc(value("ESG_PENALTY_OVERVIEW"))}</p><p><strong>摘要判斷</strong><br>${esc(value("ESG_PENALTY_RELEVANCE_SUMMARY"))}</p></details>`;
      }
      function renderReport(module) {
        const meta = scoreMeta(module.score);
        const summary = module.final_summary ?? module.FINAL_SUMMARY ?? module.riskSummary ?? "-";
        return `<div class="report-summary"><section class="report-risk-card"><div class="report-card-label">風險分數</div><div class="report-risk-value">${esc(meta.value)} <small>/ 10</small></div><span class="report-risk-level ${scoreClass(module.score)}">${esc(meta.label)}</span></section><section class="report-summary-card"><div class="report-card-label">風險摘要</div><p>${esc(summary)}</p></section></div>`;
      }
      function renderModules(item) {
        if (!item) { els.modules.innerHTML = ""; return; }
        const list = (item.modules || []).filter(m => state.activeModule === "全部" || m.name === state.activeModule);
        els.modules.innerHTML = list.length ? list.map(module => {
          const meta = scoreMeta(module.score);
          return `<article class="module">
            <header class="module-head">
              <div><h3>${esc(moduleLabel(module.name))}</h3><div class="pillrow" style="margin-top:8px">
                <span class="pill">版次：${esc(module.version || "-")}</span>
                <span class="pill">交付日：${esc(module.deliveryDate || "-")}</span>
                <span class="pill">理賠：${esc(module.claimSummary || "-")}</span>
              </div></div>
              <div class="score-panel">
                <div class="score-number">${esc(meta.value)}</div>
                <div class="score-track"><div class="score-fill" style="--score-width:${esc(meta.width)}; --score-color:${esc(meta.color)}"></div></div>
                <span class="pill score ${scoreClass(module.score)}">風險分數 ${esc(meta.label)}</span>
              </div>
            </header>
            ${renderQuickReview(module)}
            <div class="module-body">${module.name === "條件" ? renderCondition(module) : isCustomerRiskModule(module.name) ? `${renderCustomerRisk(module)}${renderStatus(item, module)}` : `${renderSections(module.sections)}${renderStatus(item, module)}`}</div>
          </article>`;
        }).join("") : `<div class="empty">此案例沒有模組資料</div>`;
        els.modules.querySelectorAll("[data-scope]").forEach(scope => {
          const moduleName = scope.dataset.scope;
          scope.querySelectorAll("[data-status]").forEach(button => button.addEventListener("click", () => {
            localStorage.setItem(storageKey(item.id, moduleName, "status", moduleVersion(module)), button.dataset.status);
            recordModuleActivity(item, module);
            renderModules(item);
          }));
          scope.querySelectorAll("[data-feedback-good], [data-feedback-bad], [data-feedback-summary]").forEach(textarea => textarea.addEventListener("input", event => {
            const field = event.target.dataset.feedbackGood !== undefined ? "note" : event.target.dataset.feedbackBad !== undefined ? "badNote" : "summary";
            localStorage.setItem(storageKey(item.id, moduleName, field, moduleVersion(module)), event.target.value);
            recordModuleActivity(item, module);
          }));
        });
      }
      function renderModules(item) {
        if (!item) { els.modules.innerHTML = ""; return; }
        const grouped = new Map();
        reportModules(item).forEach(m => { if (!grouped.has(m.name)) grouped.set(m.name, []); grouped.get(m.name).push(m); });
        const list = [...grouped.entries()].filter(([name]) => state.activeModule === "全部" || name === state.activeModule);
        els.modules.innerHTML = list.length ? list.map(([name, versions], groupIndex) => {
          const selected = versions[0];
          const selectedScore = selected.score ?? selected.SCORE;
          const meta = scoreMeta(selectedScore);
          const isReport = name === "報告";
          const versionPicker = isReport ? "" : `<div class="version-picker"><label>選擇版次</label><select class="version-select" data-version-select="${groupIndex}">${versions.map((m, i) => `<option value="${i}">${esc(m.version || `版次 ${i + 1}`)}</option>`).join("")}</select><span class="delivery-date">交付日期：${esc(selected.deliveryDate || "-")}</span></div>${name === "web search" ? "" : renderVersionJudgeList(versions, groupIndex)}`;
          const body = isReport ? renderReport(selected) : name === "條件" ? renderCondition(selected) : name === "標的" ? renderSubject(selected) : name === "歷史" ? renderHistory(selected) : name === "web search" ? renderWebSearch(selected) : isCustomerRiskModule(name) ? renderCustomerRisk(selected) : renderSections(selected.sections);
          return `<article class="module" data-version-group="${groupIndex}"><header class="module-head"><div><h3>${esc(moduleLabel(name))}</h3>${name === "歷史" ? `<div class="attention-tags" data-version-attention-tags="${groupIndex}">${renderAttentionTags(selected)}</div>` : ""}${versionPicker}</div><div class="score-panel ${name === "web search" ? "web-search-score" : ""}"><div class="score-number" data-version-score="${groupIndex}">${esc(meta.value)}</div><div class="score-track"><div class="score-fill" data-version-fill="${groupIndex}" style="--score-width:${esc(meta.width)}; --score-color:${esc(meta.color)}"></div></div><span class="pill score ${scoreClass(selectedScore)}" data-version-label="${groupIndex}">${esc(meta.label)}</span></div></header><div class="module-body" data-version-body="${groupIndex}">${body}${isReport ? "" : renderStatus(item, selected)}</div></article>`;
        }).join("") : `<div class="empty">目前沒有模組資料</div>`;
        els.modules.querySelectorAll("[data-version-select]").forEach(select => select.addEventListener("change", () => {
          const group = Number(select.dataset.versionSelect), versions = list[group][1], module = versions[Number(select.value)], moduleScore = module.score ?? module.SCORE, meta = scoreMeta(moduleScore);
          const card = select.closest(".module");
          card.querySelector(`[data-version-score="${group}"]`).textContent = meta.value;
          card.querySelector(`[data-version-fill="${group}"]`).style.setProperty("--score-width", meta.width);
          card.querySelector(`[data-version-fill="${group}"]`).style.setProperty("--score-color", meta.color);
          const label = card.querySelector(`[data-version-label="${group}"]`); label.textContent = meta.label; label.className = `pill score ${scoreClass(moduleScore)}`;
          card.querySelector(".delivery-date").textContent = `交付日期：${module.deliveryDate || "-"}`;
          card.querySelectorAll(`[data-version-judge-option="${group}"]`).forEach(chip => chip.classList.toggle("selected", chip.dataset.versionJudgeIndex === String(select.value)));
          const attentionTags = card.querySelector(`[data-version-attention-tags="${group}"]`);
          if (attentionTags) attentionTags.innerHTML = module.name === "歷史" ? renderAttentionTags(module) : "";
          card.querySelector(`[data-version-body="${group}"]`).innerHTML = `${module.name === "條件" ? renderCondition(module) : module.name === "標的" ? renderSubject(module) : module.name === "歷史" ? renderHistory(module) : module.name === "web search" ? renderWebSearch(module) : isCustomerRiskModule(module.name) ? renderCustomerRisk(module) : renderSections(module.sections)}${renderStatus(item, module)}`;
          wireStatus(card.querySelector("[data-scope]"), item, module);
        }));
        els.modules.querySelectorAll("[data-scope]").forEach(scope => {
          const moduleName = scope.dataset.scope;
          const module = reportModules(item).find(m => m.name === moduleName) || {};
          wireStatus(scope, item, module);
        });
      }
      function wireStatus(scope, item, module) {
        if (!scope) return;
        scope.querySelectorAll("[data-status]").forEach(button => button.addEventListener("click", () => {
          localStorage.setItem(storageKey(item.id, module.name, "status", moduleVersion(module)), button.dataset.status);
          recordModuleActivity(item, module);
          renderModules(item);
        }));
        scope.querySelector("[data-submit-review]")?.addEventListener("click", () => {
          localStorage.setItem(storageKey(item.id, module.name, "reviewed", moduleVersion(module)), "1");
          localStorage.setItem(storageKey(item.id, module.name, "status", moduleVersion(module)), "已確認並回饋在excel");
          recordModuleActivity(item, module);
          render();
        });
        scope.querySelector("[data-update-review]")?.addEventListener("click", () => {
          const version = moduleVersion(module);
          const selectedStatus = scope.querySelector("[data-status].active")?.dataset.status || statusOptions[0];
          const note = scope.querySelector("[data-feedback-good]")?.value || "";
          const badNote = scope.querySelector("[data-feedback-bad]")?.value || "";
          const feedbackSummary = scope.querySelector("[data-feedback-summary]")?.value || "";
          localStorage.setItem(storageKey(item.id, module.name, "status", version), selectedStatus);
          localStorage.setItem(storageKey(item.id, module.name, "note", version), note);
          localStorage.setItem(storageKey(item.id, module.name, "badNote", version), badNote);
          localStorage.setItem(storageKey(item.id, module.name, "summary", version), feedbackSummary);
          recordModuleActivity(item, module, version);
          render();
        });
        scope.querySelector("[data-clear-review]")?.addEventListener("click", () => {
          const version = moduleVersion(module);
          if (!window.confirm(`確定要清除「${module.name}」${version}的本機驗測紀錄嗎？`)) return;
          ["reviewed", "status", "note", "badNote", "summary", "tag", "aiJudgeFeedback", "aiJudgeFeedbackNote", "activityAt"].forEach(field => localStorage.removeItem(storageKey(item.id, module.name, field, version)));
          render();
        });
        scope.querySelector("[data-module-tag]")?.addEventListener("input", event => {
          const value = event.target.value.trim();
          const key = storageKey(item.id, module.name, "tag", moduleVersion(module));
          if (value) localStorage.setItem(key, value);
          else localStorage.removeItem(key);
          recordModuleActivity(item, module);
        });
        scope.querySelector("[data-module-tag]")?.addEventListener("change", () => renderCompactList());
        scope.querySelectorAll("[data-feedback-good], [data-feedback-bad], [data-feedback-summary]").forEach(textarea => textarea.addEventListener("input", event => {
          const field = event.target.dataset.feedbackGood !== undefined ? "note" : event.target.dataset.feedbackBad !== undefined ? "badNote" : "summary";
          localStorage.setItem(storageKey(item.id, module.name, field, moduleVersion(module)), event.target.value);
          recordModuleActivity(item, module);
        }));
        scope.querySelectorAll("[data-ai-judge-feedback]").forEach(button => button.addEventListener("click", event => {
          const value = event.currentTarget.dataset.aiJudgeFeedback || "";
          const version = moduleVersion(module);
          if (value) localStorage.setItem(storageKey(item.id, module.name, "aiJudgeFeedback", version), value);
          else localStorage.removeItem(storageKey(item.id, module.name, "aiJudgeFeedback", version));
          scope.querySelectorAll("[data-ai-judge-feedback]").forEach(option => option.classList.toggle("active", option === event.currentTarget));
          recordModuleActivity(item, module, version);
        }));
        scope.querySelector("[data-ai-judge-feedback-note]")?.addEventListener("input", event => {
          const version = moduleVersion(module);
          const value = event.target.value;
          if (value) localStorage.setItem(storageKey(item.id, module.name, "aiJudgeFeedbackNote", version), value);
          else localStorage.removeItem(storageKey(item.id, module.name, "aiJudgeFeedbackNote", version));
          recordModuleActivity(item, module, version);
        });
      }
      function renderCompactList() {
        const list = filteredCases();
        els.count.textContent = `${list.length}/${cases.length}`;
        els.caseList.innerHTML = list.length ? list.map(item => {
          const s = item.summary || {};
          const customer = customerDisplay(item);
          const names = [...new Set(reportModules(item).map(m => m.name).filter(Boolean))];
          const moduleTagSummary = (item.modules || []).map(m => {
            const tag = moduleTag(item, m);
            return tag ? `${moduleLabel(m.name)}：${tag}` : "";
          }).filter(Boolean).join("｜");
          const reviewedByModule = new Map();
          (item.modules || []).forEach(m => {
            const version = moduleVersion(m);
            if (localStorage.getItem(storageKey(item.id, m.name, "reviewed", version)) !== "1") return;
            if (!reviewedByModule.has(m.name)) reviewedByModule.set(m.name, []);
            reviewedByModule.get(m.name).push(version);
          });
          const reviewedSummary = [...reviewedByModule.entries()].map(([name, versions]) => `${name} ${versions.length}`).join("、");
          const reviewedDetail = [...reviewedByModule.entries()].map(([name, versions]) => `${name}：${versions.join("、")}`).join("｜");
          const reviewed = reviewedByModule.size > 0;
          return `<button class="case-btn ${item.id === state.activeCaseId ? "active" : ""} ${reviewed ? "reviewed" : ""}" data-id="${esc(item.id)}"><span class="case-title">${esc(customer.name)}</span><span class="case-sub">APPLLTE_NO：${esc(s.APPLLTE_NO || item.appllteNo || "-")}</span><span class="case-modules">${names.map(n => `<span class="case-module">${esc(moduleLabel(n))}</span>`).join("")}</span>${moduleTagSummary ? `<span class="module-tag-badge" title="模組標籤註記">⚑ ${esc(moduleTagSummary)}</span>` : ""}${reviewed ? `<span class="reviewed-mark" title="${esc(reviewedDetail)}">✓ 已驗測：${esc(reviewedSummary)}</span>` : ""}</button>`;
        }).join("") : `<div class="empty">No cases</div>`;
        els.caseList.querySelectorAll("[data-id]").forEach(button => button.addEventListener("click", () => { state.activeCaseId = button.dataset.id; state.activeModule = "全部"; render(); }));
      }
      function render() {
        const list = filteredCases();
        if (list.length && !list.some(item => item.id === state.activeCaseId)) state.activeCaseId = list[0].id;
        const item = activeCase();
        renderMeta();
        if (state.view === "usage") {
          setView("usage");
          return;
        }
        setView("review");
        renderCompactList();
        renderHead(item);
        renderFilters(item);
        renderModules(item);
        syncSidebarLayout();
      }
      els.search.addEventListener("input", () => { state.query = els.search.value; render(); });
      els.reviewViewButton.addEventListener("click", () => { state.view = "review"; render(); });
      els.usageViewButton.addEventListener("click", () => { state.view = "usage"; render(); });
      document.getElementById("print").addEventListener("click", () => window.print());
      document.getElementById("downloadExcel").addEventListener("click", exportLocalReviews);
      render();
    </script>
  </body>
</html>
